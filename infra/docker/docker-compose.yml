# CodeHost Unified Docker Environment
# This setup includes all services required for production-like local development
# Database, Redis, Traefik (Proxy), API, and Web

services:
  # --- Core Infrastructure ---
  postgres:
    image: postgres:15-alpine
    container_name: codehost-db
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASS:-pass}
      POSTGRES_DB: ${DB_NAME:-codehost}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codehost-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:latest
    container_name: codehost-proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "9000:80"
      - "8081:8080" # Traefik Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  # --- CodeHost Services ---
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: codehost-api
    ports:
      - "4000:4000" # Map API directly
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASS:-pass}@postgres:5432/codehost
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-superrefreshsecret}
      DOMAIN: ${DOMAIN:-code-host.online}
      PORT: 4000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:4000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    env_file:
      - ../../.env
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:rw"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(\"api.code-host.online\")"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.priority=300"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-https://api.code-host.online}
    container_name: codehost-web
    ports:
      - "3000:3000" # Map Web directly
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.code-host.online}
    env_file:
      - ../../.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(\"code-host.online\") || Host(\"www.code-host.online\")"
      - "traefik.http.routers.web.priority=300"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

volumes:
  postgres_data:
